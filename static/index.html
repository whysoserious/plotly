<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Plotly</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header>
        <h1>Plotly</h1>
        <p>Upload an SVG, see it rendered, peek at its first bytes.</p>
    </header>

    <section>
        <h2>Upload</h2>
        <form id="upload-form">
            <input type="file" id="file-input" accept=".svg,image/svg+xml" required>
            <button type="submit">Upload</button>
        </form>
        <p id="upload-status" class="status"></p>
    </section>

    <section>
        <h2>Preview</h2>
        <div id="svg-display" class="empty">No file selected.</div>
        <h3>First <span id="preview-n">500</span> chars</h3>
        <pre id="preview-text" class="empty">—</pre>
    </section>

    <section>
        <h2>Files on server</h2>
        <ul id="file-list" class="empty"><li>No files uploaded.</li></ul>
    </section>

    <script src="/app.js"></script>
</body>
</html>
